---
- name: Configure Package Managers to use Squid Proxy
  hosts:
    - redhathosts
    - ubuntuhosts 
    - proxmoxhosts
  become: yes
  vars:
    # OpenBSD Squid Proxy
    proxy_url: "http://192.168.90.1:3128"

  tasks:
    # --- RedHat / Oracle Linux 9 Configuration ---
    
    - name: Configure DNF proxy and disable SSL verification
      when: ansible_os_family == "RedHat"
      ansible.builtin.blockinfile:
        path: /etc/dnf/dnf.conf
        block: |
          proxy={{ proxy_url }}
          sslverify=0
        marker: "# {mark} ANSIBLE MANAGED PROXY SETTINGS"

    - name: Find all repository files on remote RedHat hosts
      when: ansible_os_family == "RedHat"
      ansible.builtin.find:
        paths: /etc/yum.repos.d
        patterns: "*.repo"
      register: remote_repo_files

    - name: Switch RedHat repositories from HTTPS to HTTP
      when: ansible_os_family == "RedHat"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: 'https://'
        replace: 'http://'
      loop: "{{ remote_repo_files.files }}"
      # This ensures Squid can see the GET requests instead of a TCP_TUNNEL

    # --- Ubuntu / Debian Configuration ---

    - name: Configure APT proxy for Ubuntu
      when: ansible_os_family == "Debian"
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/80proxy
        content: |
          Acquire::http::Proxy "{{ proxy_url }}/";
          Acquire::https::Proxy "{{ proxy_url }}/";
          Acquire::https::Verify-Peer "false";
        owner: root
        group: root
        mode: '0644'

    # --- Connectivity Verification ---

    - name: Verify proxy connectivity (Plain HTTP)
      ansible.builtin.uri:
        url: http://mirror.rise.ph/speed-test/speed_test_16MB
        timeout: 10
      environment:
        http_proxy: "{{ proxy_url }}"
      register: proxy_test
      ignore_errors: yes

    - name: Show proxy test result
      ansible.builtin.debug:
        msg: "Proxy is reachable from {{ inventory_hostname }}"
      when: proxy_test.status is defined and proxy_test.status == 200
